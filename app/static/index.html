<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BFSI Loan Voice Agent</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #13201d;
        --muted: #5b6763;
        --line: #d7ded9;
        --bg: #f7faf8;
        --panel: #ffffff;
        --accent: #087f5b;
        --accent-strong: #065f46;
        --warn: #a15c00;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }
      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 30px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .status {
        min-width: 190px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 22px;
        margin-top: 22px;
      }
      section {
        min-width: 0;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      label {
        display: block;
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 11px 12px;
        font: inherit;
        color: var(--ink);
        background: #fff;
      }
      textarea {
        min-height: 104px;
        resize: vertical;
      }
      .field {
        margin-bottom: 14px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        min-height: 42px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: var(--accent-strong);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .conversation {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        background: #fff;
      }
      .bubble.user {
        border-color: #b9d8cf;
        background: #eefaf5;
      }
      .bubble strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: var(--muted);
      }
      .metric-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }
      .metric b {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }
      .hint {
        margin-top: 12px;
        color: var(--warn);
        font-size: 13px;
      }
      @media (max-width: 860px) {
        header,
        .grid {
          grid-template-columns: 1fr;
          display: grid;
        }
        .row,
        .metric-strip {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>BFSI Loan Voice Agent</h1>
          <p>Loan status, EMI answers, document checks, and human handoff through a reliability-first voice flow.</p>
        </div>
        <div class="status" id="health">Checking backend...</div>
      </header>

      <div class="grid">
        <section class="panel">
          <div class="row">
            <div class="field">
              <label for="loanId">Loan ID</label>
              <input id="loanId" value="12345" autocomplete="off" />
            </div>
            <div class="field">
              <label for="phoneLast4">Phone last 4</label>
              <input id="phoneLast4" value="7788" inputmode="numeric" autocomplete="off" />
            </div>
          </div>
          <div class="field">
            <label for="utterance">Customer utterance</label>
            <textarea id="utterance">What's the status of my loan?</textarea>
          </div>
          <div class="actions">
            <button id="send">Send</button>
            <button class="secondary" id="speak">Speak</button>
            <button class="secondary" id="stop">Stop</button>
          </div>
          <p class="hint" id="hint"></p>
        </section>

        <section>
          <div class="conversation" id="conversation"></div>
          <div class="metric-strip">
            <div class="metric"><span>Backend latency</span><b id="latency">-</b></div>
            <div class="metric"><span>Intent confidence</span><b id="confidence">-</b></div>
            <div class="metric"><span>Handoff</span><b id="handoff">-</b></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        health: document.querySelector("#health"),
        loanId: document.querySelector("#loanId"),
        phoneLast4: document.querySelector("#phoneLast4"),
        utterance: document.querySelector("#utterance"),
        send: document.querySelector("#send"),
        speak: document.querySelector("#speak"),
        stop: document.querySelector("#stop"),
        conversation: document.querySelector("#conversation"),
        latency: document.querySelector("#latency"),
        confidence: document.querySelector("#confidence"),
        handoff: document.querySelector("#handoff"),
        hint: document.querySelector("#hint"),
      };

      let currentAudio = null;
      const recognition = window.SpeechRecognition || window.webkitSpeechRecognition
        ? new (window.SpeechRecognition || window.webkitSpeechRecognition)()
        : null;

      function addBubble(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.innerHTML = `<strong>${role === "user" ? "Customer" : "Agent"}</strong>${text}`;
        els.conversation.prepend(bubble);
      }

      async function checkHealth() {
        const res = await fetch("/health");
        const data = await res.json();
        els.health.textContent = data.elevenlabs_tts_configured
          ? "ElevenLabs TTS ready"
          : "Backend ready, TTS key missing";
      }

      async function sendUtterance(playAudio = false) {
        els.hint.textContent = "";
        const payload = {
          text: els.utterance.value,
          loan_id: els.loanId.value || null,
          phone_last4: els.phoneLast4.value || null,
          session_id: "browser-demo",
        };

        const started = performance.now();
        const res = await fetch("/api/conversation", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        const elapsed = Math.round(performance.now() - started);

        addBubble("user", payload.text);
        addBubble("agent", data.text);
        els.latency.textContent = `${elapsed}ms`;
        els.confidence.textContent = `${Math.round(data.confidence * 100)}%`;
        els.handoff.textContent = data.needs_handoff ? "Yes" : "No";

        if (playAudio) {
          await playElevenLabs(payload, data.text);
        }
      }

      async function playElevenLabs(payload, fallbackText) {
        stopAudio();
        const res = await fetch("/api/voice/synthesize", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          els.hint.textContent = "ElevenLabs TTS is not configured, using browser speech for the local demo.";
          const utterance = new SpeechSynthesisUtterance(fallbackText);
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
          return;
        }

        const blob = await res.blob();
        currentAudio = new Audio(URL.createObjectURL(blob));
        await currentAudio.play();
      }

      function stopAudio() {
        window.speechSynthesis.cancel();
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
        }
      }

      els.send.addEventListener("click", () => sendUtterance(false));
      els.speak.addEventListener("click", () => {
        if (!recognition) {
          els.hint.textContent = "Speech recognition is not available in this browser.";
          return;
        }
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.start();
      });
      els.stop.addEventListener("click", stopAudio);

      if (recognition) {
        recognition.onresult = (event) => {
          els.utterance.value = event.results[0][0].transcript;
          sendUtterance(true);
        };
      }

      checkHealth().catch(() => {
        els.health.textContent = "Backend unavailable";
      });
    </script>
  </body>
</html>
