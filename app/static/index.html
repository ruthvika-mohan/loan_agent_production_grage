<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BFSI Loan Voice Agent</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #13201d;
        --muted: #5b6763;
        --line: #d7ded9;
        --bg: #f7faf8;
        --panel: #ffffff;
        --accent: #087f5b;
        --accent-strong: #065f46;
        --warn: #a15c00;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }
      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 30px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .status {
        min-width: 190px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 22px;
        margin-top: 22px;
      }
      section {
        min-width: 0;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      label {
        display: block;
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 11px 12px;
        font: inherit;
        color: var(--ink);
        background: #fff;
      }
      textarea {
        min-height: 104px;
        resize: vertical;
      }
      input:disabled,
      textarea:disabled {
        color: var(--muted);
        background: #f0f3f1;
        cursor: not-allowed;
      }
      .field {
        margin-bottom: 14px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        min-height: 42px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: var(--accent-strong);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .conversation {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        background: #fff;
      }
      .bubble.user {
        border-color: #b9d8cf;
        background: #eefaf5;
      }
      .bubble strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: var(--muted);
      }
      .metric-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }
      .metric b {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }
      .hint {
        margin-top: 12px;
        color: var(--warn);
        font-size: 13px;
      }
      .call-state {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        background: #fff;
        font-size: 14px;
        font-weight: 700;
      }
      .call-state.active {
        border-color: #b9d8cf;
        color: var(--accent-strong);
        background: #eefaf5;
      }
      @media (max-width: 860px) {
        header,
        .grid {
          grid-template-columns: 1fr;
          display: grid;
        }
        .row,
        .metric-strip {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>BFSI Loan Voice Agent</h1>
          <p>Loan status, EMI answers, document checks, and human handoff through a reliability-first voice flow.</p>
        </div>
        <div class="status" id="health">Checking backend...</div>
      </header>

      <div class="grid">
        <section class="panel">
          <div class="row">
            <div class="field">
              <label for="loanId">Loan ID</label>
              <input id="loanId" value="12345" autocomplete="off" />
            </div>
            <div class="field">
              <label for="phoneLast4">Phone last 4</label>
              <input id="phoneLast4" value="7788" inputmode="numeric" autocomplete="off" />
            </div>
          </div>
          <div class="field">
            <label for="utterance">Live transcript</label>
            <textarea id="utterance" disabled>Start the call, then speak naturally.</textarea>
          </div>
          <div class="actions">
            <button id="startCall">Start Call</button>
            <button class="secondary" id="endCall" disabled>End Call</button>
          </div>
          <div class="call-state" id="callState">Call idle</div>
          <p class="hint" id="hint"></p>
        </section>

        <section>
          <div class="conversation" id="conversation"></div>
          <div class="metric-strip">
            <div class="metric"><span>Backend latency</span><b id="latency">-</b></div>
            <div class="metric"><span>Intent confidence</span><b id="confidence">-</b></div>
            <div class="metric"><span>Handoff</span><b id="handoff">-</b></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        health: document.querySelector("#health"),
        loanId: document.querySelector("#loanId"),
        phoneLast4: document.querySelector("#phoneLast4"),
        utterance: document.querySelector("#utterance"),
        startCall: document.querySelector("#startCall"),
        endCall: document.querySelector("#endCall"),
        callState: document.querySelector("#callState"),
        conversation: document.querySelector("#conversation"),
        latency: document.querySelector("#latency"),
        confidence: document.querySelector("#confidence"),
        handoff: document.querySelector("#handoff"),
        hint: document.querySelector("#hint"),
      };

      let currentAudio = null;
      let currentAudioUrl = null;
      let callActive = false;
      let listening = false;
      let speaking = false;
      let suppressRecognitionRestart = false;
      let welcomeAudioUrl = null;
      let welcomeAudioReady = false;
      const welcomePrompt = (
        "Thank you for calling the loan support desk. "
        + "I can help with loan status, EMI details, pending documents, or connect you to a specialist. "
        + "How can I help today?"
      );
      const goodbyePrompt = "Thank you for calling. Goodbye.";
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = Recognition ? new Recognition() : null;

      if (recognition) {
        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = false;
      }

      function addBubble(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        const label = document.createElement("strong");
        label.textContent = role === "user" ? "Customer" : "Agent";
        bubble.append(label, document.createTextNode(text));
        els.conversation.prepend(bubble);
      }

      async function checkHealth() {
        const res = await fetch("/health");
        const data = await res.json();
        els.health.textContent = data.elevenlabs_tts_configured
          ? "ElevenLabs TTS ready"
          : "Backend ready, TTS key missing";
        if (data.elevenlabs_tts_configured) {
          warmWelcomeAudio();
        }
      }

      function setCallState(text, active = false) {
        els.callState.textContent = text;
        els.callState.classList.toggle("active", active);
      }

      function currentPayload(text) {
        return {
          text,
          loan_id: els.loanId.value || null,
          phone_last4: els.phoneLast4.value || null,
          session_id: "browser-demo",
        };
      }

      function captureLoanIdFromSpeech(text) {
        const digits = text.replace(/\D/g, "");
        if (!els.loanId.value && digits.length >= 5) {
          els.loanId.value = digits.slice(0, 5);
        }
      }

      async function sendUtterance(playAudio = false, spokenText = els.utterance.value) {
        els.hint.textContent = "";
        captureLoanIdFromSpeech(spokenText);
        const payload = currentPayload(spokenText);

        const started = performance.now();
        const res = await fetch("/api/conversation", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        const elapsed = Math.round(performance.now() - started);

        addBubble("user", payload.text);
        addBubble("agent", data.text);
        els.latency.textContent = `${elapsed}ms`;
        els.confidence.textContent = `${Math.round(data.confidence * 100)}%`;
        els.handoff.textContent = data.needs_handoff ? "Yes" : "No";

        if (playAudio) {
          const shouldEndAfterSpeech = Boolean(data.tool_result?.end_call);
          const shouldTransfer = Boolean(data.tool_result?.transfer);
          await speakText(data.text, callActive && !shouldEndAfterSpeech && !shouldTransfer);
          if (shouldTransfer) {
            simulateTransfer(data.tool_result.queue || "loan_specialist");
          }
          if (shouldEndAfterSpeech) {
            await endCall("Call ended gracefully.");
          }
        }
      }

      async function playElevenLabs(payload, fallbackText, resumeAfterPlayback = false) {
        await speakViaEndpoint("/api/voice/synthesize", payload, fallbackText, resumeAfterPlayback);
      }

      async function speakText(text, resumeAfterPlayback = false) {
        await speakViaEndpoint("/api/voice/say", { text }, text, resumeAfterPlayback);
      }

      async function warmWelcomeAudio() {
        if (welcomeAudioReady || welcomeAudioUrl) {
          return;
        }
        const res = await fetch("/api/voice/say", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text: welcomePrompt }),
        });
        if (!res.ok) {
          return;
        }
        const blob = await res.blob();
        welcomeAudioUrl = URL.createObjectURL(blob);
        welcomeAudioReady = true;
      }

      async function playCachedWelcome() {
        if (!welcomeAudioReady || !welcomeAudioUrl) {
          await speakText(welcomePrompt, true);
          return;
        }
        stopPlayback(false);
        speaking = true;
        setCallState("Agent is speaking", true);
        els.hint.textContent = "Playing welcome.";
        currentAudio = new Audio(welcomeAudioUrl);
        currentAudio.onended = () => {
          speaking = false;
          currentAudio = null;
          startListening();
        };
        currentAudio.onerror = () => {
          speaking = false;
          currentAudio = null;
          speakText(welcomePrompt, true);
        };
        await currentAudio.play();
      }

      async function speakViaEndpoint(endpoint, body, fallbackText, resumeAfterPlayback = false) {
        stopPlayback(false);
        speaking = true;
        els.hint.textContent = "Preparing audio...";
        setCallState("Agent is speaking", callActive);
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          if (!("speechSynthesis" in window)) {
            speaking = false;
            els.hint.textContent = "Audio playback is unavailable in this browser.";
            return;
          }
          const detail = await res.json().catch(() => ({}));
          els.hint.textContent = detail.error
            ? `${detail.error} Using browser speech instead.`
            : "ElevenLabs TTS is unavailable, using browser speech instead.";
          const utterance = new SpeechSynthesisUtterance(fallbackText);
          window.speechSynthesis.cancel();
          await new Promise((resolve) => {
            utterance.onend = () => {
              speaking = false;
              if (resumeAfterPlayback) {
                startListening();
              }
              resolve();
            };
            utterance.onerror = () => {
              speaking = false;
              setCallState("Audio failed", callActive);
              if (resumeAfterPlayback) {
                startListening();
              }
              resolve();
            };
            window.speechSynthesis.speak(utterance);
          });
          return;
        }

        const blob = await res.blob();
        currentAudioUrl = URL.createObjectURL(blob);
        currentAudio = new Audio(currentAudioUrl);
        els.hint.textContent = "Playing ElevenLabs audio.";
        const audio = currentAudio;
        const playbackEnded = new Promise((resolve) => {
          audio.onended = () => {
            speaking = false;
            stopPlayback(false);
            if (resumeAfterPlayback) {
              startListening();
            }
            resolve();
          };
          audio.onerror = () => {
            speaking = false;
            setCallState("Audio failed", callActive);
            if (resumeAfterPlayback) {
              startListening();
            }
            resolve();
          };
        });
        await currentAudio.play();
        await playbackEnded;
      }

      function stopPlayback(showMessage = true) {
        speaking = false;
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          currentAudio = null;
        }
        if (currentAudioUrl) {
          URL.revokeObjectURL(currentAudioUrl);
          currentAudioUrl = null;
        }
        if (showMessage) {
          els.hint.textContent = "Playback stopped.";
        }
      }

      function startListening() {
        if (!callActive || speaking || !recognition || listening) {
          return;
        }
        try {
          suppressRecognitionRestart = false;
          recognition.start();
          listening = true;
          setCallState("Listening", true);
          els.hint.textContent = "Speak now. I will respond after you pause.";
        } catch {
          listening = false;
        }
      }

      function stopListening() {
        if (!recognition || !listening) {
          return;
        }
        suppressRecognitionRestart = true;
        recognition.stop();
        listening = false;
      }

      async function startCall() {
        if (!recognition) {
          els.hint.textContent = "Speech recognition is not available in this browser. Use Chrome at the localhost URL.";
          return;
        }
        callActive = true;
        els.startCall.disabled = true;
        els.endCall.disabled = false;
        els.loanId.disabled = true;
        els.phoneLast4.disabled = true;
        setCallState("Starting call", true);
        addBubble("agent", welcomePrompt);
        await playCachedWelcome();
      }

      function finishCall(message = "Call ended.") {
        const finalMessage = typeof message === "string" ? message : "Call ended.";
        callActive = false;
        stopListening();
        stopPlayback(false);
        els.startCall.disabled = false;
        els.endCall.disabled = true;
        els.loanId.disabled = false;
        els.phoneLast4.disabled = false;
        setCallState("Call ended");
        els.hint.textContent = finalMessage;
      }

      async function endCall(message = "Call ended.", speakGoodbye = false) {
        stopListening();
        if (speakGoodbye) {
          addBubble("agent", goodbyePrompt);
          await speakText(goodbyePrompt, false);
        }
        finishCall(message);
      }

      function simulateTransfer(queue) {
        callActive = false;
        stopListening();
        els.startCall.disabled = false;
        els.endCall.disabled = true;
        els.loanId.disabled = false;
        els.phoneLast4.disabled = false;
        setCallState("Transferred to specialist");
        els.hint.textContent = `Simulated transfer complete: ${queue}.`;
      }

      if (recognition) {
        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          if (!transcript) {
            startListening();
            return;
          }
          listening = false;
          els.utterance.value = transcript;
          setCallState("Thinking", true);
          sendUtterance(true, transcript).catch(() => {
            speaking = false;
            setCallState("Something went wrong", callActive);
            if (callActive) {
              startListening();
            }
          });
        };

        recognition.onerror = (event) => {
          listening = false;
          if (event.error === "no-speech" && callActive) {
            setCallState("Listening", true);
            startListening();
            return;
          }
          els.hint.textContent = `Speech recognition error: ${event.error}.`;
          if (callActive) {
            window.setTimeout(startListening, 500);
          }
        };

        recognition.onend = () => {
          listening = false;
          if (callActive && !speaking && !suppressRecognitionRestart) {
            window.setTimeout(startListening, 250);
          }
        };
      }

      els.startCall.addEventListener("click", startCall);
      els.endCall.addEventListener("click", () => endCall("Call ended by customer.", true));

      checkHealth().catch(() => {
        els.health.textContent = "Backend unavailable";
      });
    </script>
  </body>
</html>
